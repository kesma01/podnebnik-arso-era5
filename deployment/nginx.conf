server {
    listen 80;
    server_name _;

    # Datasette proxy — DATASETTE_HOST is set via --build-arg or defaults to host.docker.internal
    # On Linux: docker run --add-host=host.docker.internal:host-gateway
    location /datasette/ {
        proxy_pass         http://host.docker.internal:8001/;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
    }

    # Vremenar proxy — avoids browser CORS issues
    location /vremenar/ {
        rewrite ^/vremenar/(.*) /staging/$1 break;
        proxy_pass         https://podnebnik.vremenar.app;
        proxy_set_header   Host podnebnik.vremenar.app;
        proxy_ssl_server_name on;
        proxy_read_timeout 10s;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;
}
